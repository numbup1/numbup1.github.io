<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Kindle Clock</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #fff;
      color: #000;
      font-family: monospace;
      overflow: hidden;
      -webkit-text-size-adjust: none;
    }
    .container {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-box-align: center;
      -webkit-box-pack: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 10px;
    }
    .time {
      font-size: 110px;
      font-weight: bold;
      letter-spacing: 4px;
      text-align: center;
    }
    .today-info {
      font-size: 22px;
      color: #333;
      margin-top: 6px;
      text-align: center;
      letter-spacing: 2px;
    }
    table.cal {
      border-collapse: collapse;
      width: 100%;
      max-width: 580px;
      margin-top: 18px;
    }
    table.cal th {
      font-size: 20px;
      padding: 8px 0;
      text-align: center;
      border-bottom: 1px solid #ccc;
      color: #555;
    }
    table.cal td {
      text-align: center;
      vertical-align: top;
      padding: 5px 2px;
      height: 58px;
      width: 14.28%;
    }
    table.cal td .solar {
      font-size: 24px;
      font-weight: bold;
    }
    table.cal td .lunar {
      font-size: 14px;
      color: #666;
      margin-top: 2px;
    }
    table.cal td.today .solar {
      display: inline-block;
      background: #000;
      color: #fff;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      line-height: 34px;
      text-align: center;
    }
    table.cal td.other .solar {
      color: #bbb;
    }
    table.cal td.other .lunar {
      color: #ccc;
    }
    .festival { color: #000; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <div class="time" id="time">00:00</div>
  <div class="today-info" id="todayInfo"></div>
  <table class="cal" id="calTable"></table>
</div>
<script>
// ===== ејәеҲ¶дҪҝз”Ё UTC+8 ж—¶еҢә =====
function getCST() {
  var now = new Date();
  var utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 8 * 3600000);
}

var lunarInfo = [
0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,

0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,

0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06b20,0x1a6c4,0x0aae0,
0x092e0,0x0d2e3,0x0c960,0x0d557,0x0d4a0,0x0da50,0x05d55,0x056a0,0x0a6d0,0x055d4,
0x052d0,0x0a9b8,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,
0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x14b55,0x04b60,0x0a570,0x054e4,0x0d160,
0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a4d0,0x0d150,0x0f252,
0x0d520
];

var Gan = ['з”І','д№ҷ','дёҷ','дёҒ','жҲҠ','е·ұ','еәҡ','иҫӣ','еЈ¬','зҷё'];
var Zhi = ['еӯҗ','дё‘','еҜ…','еҚҜ','иҫ°','е·і','еҚҲ','жңӘ','з”і','й…ү','жҲҢ','дәҘ'];
var Animals = ['йј ','зүӣ','иҷҺ','е…”','йҫҷ','иӣҮ','й©¬','зҫҠ','зҢҙ','йёЎ','зӢ—','зҢӘ'];
var lunarMonths = ['жӯЈ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','дёғ','е…«','д№қ','еҚҒ','еҶ¬','и…Ҡ'];
var lunarDays = ['еҲқдёҖ','еҲқдәҢ','еҲқдёү','еҲқеӣӣ','еҲқдә”','еҲқе…ӯ','еҲқдёғ','еҲқе…«','еҲқд№қ','еҲқеҚҒ',
  'еҚҒдёҖ','еҚҒдәҢ','еҚҒдёү','еҚҒеӣӣ','еҚҒдә”','еҚҒе…ӯ','еҚҒдёғ','еҚҒе…«','еҚҒд№қ','дәҢеҚҒ',
  'е»ҝдёҖ','е»ҝдәҢ','е»ҝдёү','е»ҝеӣӣ','е»ҝдә”','е»ҝе…ӯ','е»ҝдёғ','е»ҝе…«','е»ҝд№қ','дёүеҚҒ'];

var solarTerms = [
  'е°ҸеҜ’','еӨ§еҜ’','з«ӢжҳҘ','йӣЁж°ҙ','жғҠиӣ°','жҳҘеҲҶ','жё…жҳҺ','и°·йӣЁ',
  'з«ӢеӨҸ','е°Ҹж»Ў','иҠ’з§Қ','еӨҸиҮі','е°Ҹжҡ‘','еӨ§жҡ‘','з«Ӣз§Ӣ','еӨ„жҡ‘',
  'зҷҪйңІ','з§ӢеҲҶ','еҜ’йңІ','йңңйҷҚ','з«ӢеҶ¬','е°ҸйӣӘ','еӨ§йӣӘ','еҶ¬иҮі'
];
var sTermInfo = [
  0,21208,42467,63836,85337,107014,128867,150921,
  173149,195551,218072,240693,263343,285989,308563,331033,
  353350,375494,397447,419210,440795,462224,483532,504758
];

var lunarFestivals = {
  '1-1':'жҳҘиҠӮ','1-15':'е…ғе®өиҠӮ','5-5':'з«ҜеҚҲиҠӮ',
  '7-7':'дёғеӨ•','7-15':'дёӯе…ғиҠӮ','8-15':'дёӯз§ӢиҠӮ',
  '9-9':'йҮҚйҳіиҠӮ','12-30':'йҷӨеӨ•','12-8':'и…Ҡе…«'
};
var solarFestivals = {
  '1-1':'е…ғж—Ұ','2-14':'жғ…дәәиҠӮ','3-8':'еҰҮеҘіиҠӮ','3-12':'жӨҚж ‘иҠӮ',
  '4-1':'ж„ҡдәәиҠӮ','5-1':'еҠіеҠЁиҠӮ','5-4':'йқ’е№ҙиҠӮ','6-1':'е„ҝз«ҘиҠӮ',
  '7-1':'е»әе…ҡиҠӮ','8-1':'е»әеҶӣиҠӮ','9-10':'ж•ҷеёҲиҠӮ','10-1':'еӣҪеәҶиҠӮ',
  '12-25':'еңЈиҜһиҠӮ'
};

function lYearDays(y) {
  var sum = 348;
  for (var i = 0x8000; i > 0x8; i >>= 1) sum += (lunarInfo[y-1900] & i) ? 1 : 0;
  return sum + leapDays(y);
}
function leapMonth(y) { return lunarInfo[y-1900] & 0xf; }
function leapDays(y) {
  if (leapMonth(y)) return (lunarInfo[y-1900] & 0x10000) ? 30 : 29;
  return 0;
}
function monthDays(y, m) { return (lunarInfo[y-1900] & (0x10000 >> m)) ? 30 : 29; }

function solar2lunar(y, m, d) {
  var baseDate = new Date(1900, 0, 31);
  var objDate = new Date(y, m - 1, d);
  var offset = Math.floor((objDate - baseDate) / 86400000);
  var ly = 1900, temp = 0;
  for (; ly < 2101 && offset > 0; ly++) { temp = lYearDays(ly); offset -= temp; }
  if (offset < 0) { offset += temp; ly--; }
  var lm = 1, leap = leapMonth(ly), isLeap = false;
  for (; lm < 13 && offset > 0; lm++) {
    if (leap > 0 && lm === (leap + 1) && !isLeap) { --lm; isLeap = true; temp = leapDays(ly); }
    else { temp = monthDays(ly, lm); }
    if (isLeap && lm === (leap + 1)) isLeap = false;
    offset -= temp;
  }
  if (offset === 0 && leap > 0 && lm === leap + 1) { if (!isLeap) { isLeap = true; --lm; } }
  if (offset < 0) { offset += temp; --lm; }
  var ld = offset + 1;
  var term = '';
  var solarM = m - 1;
  for (var i = solarM * 2; i <= solarM * 2 + 1; i++) {
    var sDate = new Date(31556925974.7 * (y - 1900) + sTermInfo[i] * 60000);
    sDate = new Date(sDate.getUTCFullYear(), sDate.getUTCMonth(), sDate.getUTCDate());
    if (sDate.getDate() === d) { term = solarTerms[i]; break; }
  }
  var lFest = lunarFestivals[lm + '-' + ld] || '';
  var sFest = solarFestivals[m + '-' + d] || '';
  return {
    lYear: ly, lMonth: lm, lDay: ld, isLeap: isLeap,
    monthStr: (isLeap ? 'й—°' : '') + lunarMonths[lm - 1] + 'жңҲ',
    dayStr: lunarDays[ld - 1],
    term: term, lFestival: lFest, sFestival: sFest,
    animal: Animals[(ly - 4) % 12],
    ganZhiYear: Gan[(ly - 4) % 10] + Zhi[(ly - 4) % 12]
  };
}

function getDayLabel(y, m, d) {
  var info = solar2lunar(y, m, d);
  if (info.sFestival) return info.sFestival;
  if (info.lFestival) return info.lFestival;
  if (info.term) return info.term;
  return info.dayStr;
}

function isFestOrTerm(y, m, d) {
  var info = solar2lunar(y, m, d);
  return !!(info.sFestival || info.lFestival || info.term);
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

function buildCalendar(year, month, today) {
  var firstDay = new Date(year, month - 1, 1).getDay();
  var startOffset = (firstDay === 0) ? 6 : firstDay - 1;
  var totalDays = daysInMonth(year, month);
  var prevDays = daysInMonth(year, month === 1 ? 12 : month - 1);
  var prevMonth = month === 1 ? 12 : month - 1;
  var prevYear = month === 1 ? year - 1 : year;
  var nextMonth = month === 12 ? 1 : month + 1;
  var nextYear = month === 12 ? year + 1 : year;

  var html = '<tr><th>дёҖ</th><th>дәҢ</th><th>дёү</th><th>еӣӣ</th><th>дә”</th><th>е…ӯ</th><th>ж—Ҙ</th></tr>';
  var cells = [];
  for (var i = startOffset - 1; i >= 0; i--) cells.push({ y: prevYear, m: prevMonth, d: prevDays - i, other: true });
  for (var d = 1; d <= totalDays; d++) cells.push({ y: year, m: month, d: d, other: false });
  var remain = 7 - (cells.length % 7);
  if (remain < 7) for (var j = 1; j <= remain; j++) cells.push({ y: nextYear, m: nextMonth, d: j, other: true });

  for (var c = 0; c < cells.length; c++) {
    if (c % 7 === 0) html += '<tr>';
    var cell = cells[c];
    var label = getDayLabel(cell.y, cell.m, cell.d);
    var cls = '';
    if (cell.other) cls += ' other';
    if (!cell.other && cell.d === today) cls += ' today';
    var festCls = (!cell.other && isFestOrTerm(cell.y, cell.m, cell.d)) ? ' festival' : '';
    html += '<td class="' + cls + '"><div class="solar">' + cell.d + '</div><div class="lunar' + festCls + '">' + label + '</div></td>';
    if (c % 7 === 6) html += '</tr>';
  }
  return html;
}

var lastMin = '';
function update() {
  var now = getCST(); // дҪҝз”Ё UTC+8
  var h = pad(now.getHours());
  var m = pad(now.getMinutes());
  var curMin = h + ':' + m;

  if (curMin !== lastMin) {
    document.getElementById('time').innerHTML = curMin;
    lastMin = curMin;

    var y = now.getFullYear();
    var mo = now.getMonth() + 1;
    var d = now.getDate();
    var weekdays = ['жҳҹжңҹж—Ҙ','жҳҹжңҹдёҖ','жҳҹжңҹдәҢ','жҳҹжңҹдёү','жҳҹжңҹеӣӣ','жҳҹжңҹдә”','жҳҹжңҹе…ӯ'];
    var info = solar2lunar(y, mo, d);

    document.getElementById('todayInfo').innerHTML =
      y + 'е№ҙ' + pad(mo) + 'жңҲ' + pad(d) + 'ж—Ҙ  ' + weekdays[now.getDay()] +
      '  ' + info.ganZhiYear + 'е№ҙпјҲ' + info.animal + 'пјү' + info.monthStr + info.dayStr;

    document.getElementById('calTable').innerHTML = buildCalendar(y, mo, d);
  }
}

setInterval(update, 1000);
update();
setInterval(function() { window.scrollTo(0, 0); }, 30000);
</script>
