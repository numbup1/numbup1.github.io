<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Kindle Clock</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #fff;
      color: #000;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-box-align: center;
      -webkit-box-pack: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
      overflow: hidden;
      -webkit-text-size-adjust: none;
    }
    .clock {
      text-align: center;
    }
    .time {
      font-size: 130px;
      font-weight: bold;
      letter-spacing: 6px;
    }
    .date {
      font-size: 30px;
      color: #333;
      margin-top: 24px;
      letter-spacing: 4px;
    }
    .weekday {
      font-size: 26px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="clock">
    <div class="time" id="time">00:00</div>
    <div class="date" id="date">2026-01-01</div>
    <div class="weekday" id="weekday"></div>
  </div>
  <script>
    var days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    var lastMin = '';

    function pad(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    function update() {
      var now = new Date();
      var h = pad(now.getHours());
      var m = pad(now.getMinutes());
      var curMin = h + ':' + m;

      if (curMin !== lastMin) {
        document.getElementById('time').innerHTML = curMin;
        lastMin = curMin;

        var y = now.getFullYear();
        var mo = pad(now.getMonth() + 1);
        var d = pad(now.getDate());
        document.getElementById('date').innerHTML = y + '-' + mo + '-' + d;
        document.getElementById('weekday').innerHTML = days[now.getDay()];
      }
    }

    setInterval(update, 1000);
    update();

    // 防止 Kindle 浏览器休眠
    setInterval(function() {
      window.scrollTo(0, 0);
    }, 30000);
  </script>
</body>
</html>
